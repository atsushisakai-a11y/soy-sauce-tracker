name: kikkoman_price_tracker
version: "1.0.0"
config-version: 2

profile: kikkoman_price_tracker

model-paths: ["models"]
seed-paths:  ["seeds"]
test-paths:  ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

dispatch:
  - macro_namespace: dbt
    search_order: ['kikkoman_price_tracker', 'dbt']

models:
  kikkoman_price_tracker:
    raw:
      +schema: raw
      +materialized: view
    staging:
      +schema: staging
      +materialized: table
    dwh:
      +schema: dwh
      +materialized: table
    datamart:
      +schema: datamart
      +materialized: view
