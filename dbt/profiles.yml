# Used by GitHub Actions (reads credentials from GOOGLE_APPLICATION_CREDENTIALS env var).
# For local development: run `gcloud auth application-default login` and use method: oauth.
# Safe to commit — contains no real credentials.

kikkoman_price_tracker:
  target: prod
  outputs:
    prod:
      type: bigquery
      method: service-account
      project: soy-sauce-tracker
      dataset: staging
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      threads: 4
      timeout_seconds: 300
      location: EU
