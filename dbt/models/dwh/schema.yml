version: 2

models:
  - name: gold_price_summary
    description: >
      Gold — market-level price statistics per product per scrape date.
      One row per brand × variant × volume × scrape_date.
    columns:
      - name: brand
        tests: [not_null]
      - name: product_variant
        tests: [not_null]
      - name: scrape_date
        tests: [not_null]
      - name: shop_count
        description: "Number of shops included in this snapshot."
        tests: [not_null]
      - name: min_price_eur
        tests: [not_null]
      - name: avg_price_eur
        tests: [not_null]
      - name: price_spread_pct
        description: "% spread between cheapest and most expensive shop."
