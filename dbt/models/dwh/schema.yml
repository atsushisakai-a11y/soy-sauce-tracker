version: 2

models:
  - name: dim_price_history
    description: >
      SCD Type 2 dimension — one row per distinct version of a product's attributes.
      A new version is recorded whenever product_url or product_image_url changes.
      is_latest = TRUE marks the single most-recent version per product.
    columns:
      - name: product_id
        description: "Surrogate key hashed from product_name, shop_name, and volume_ml."
        tests: [not_null]
      - name: global_product_id
        description: "UUID shared by products matched across shops via image similarity."
        tests: [not_null]
      - name: shop_name
        tests: [not_null]
      - name: product_name
        tests: [not_null]
      - name: brand
        tests: [not_null]
      - name: volume_ml
        tests: [not_null]
      - name: valid_from
        description: "Earliest scrape date this attribute combination was observed."
        tests: [not_null]
      - name: valid_to
        description: "Latest scrape date this attribute combination was observed."
        tests: [not_null]
      - name: is_latest
        description: "TRUE for the single most-recent version per product_id."
        tests: [not_null]

  - name: dim_price
    description: >
      Latest version of each product — one row per product_id.
      Filtered from dim_price_history where is_latest = TRUE.
    columns:
      - name: product_id
        description: "Surrogate key hashed from product_name, shop_name, and volume_ml."
        tests: [not_null, unique]
      - name: global_product_id
        description: "UUID shared by products matched across shops via image similarity."
        tests: [not_null]
      - name: shop_name
        description: "Name of the online shop (e.g. Shilla Market, Dun Yong)."
        tests: [not_null]
      - name: product_name
        description: "Product title exactly as scraped from the shop website."
        tests: [not_null]
      - name: brand
        description: "Brand name — always Kikkoman."
        tests: [not_null]
      - name: volume_ml
        description: "Product volume in millilitres, parsed from the product name."
        tests: [not_null]
      - name: valid_from
        description: "Earliest scrape date the latest version was observed."
        tests: [not_null]
      - name: valid_to
        description: "Latest scrape date the latest version was observed."
        tests: [not_null]

  - name: fact_price
    description: "Fact table — one row per shop per scrape run with price."
    columns:
      - name: scrape_run_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: price_eur
        tests: [not_null]
      - name: scrape_date
        tests: [not_null]
