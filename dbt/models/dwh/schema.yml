version: 2

models:
  - name: dim_price
    description: "Dimension table — one row per shop × product combination."
    columns:
      - name: price_dim_key
        description: "Surrogate key (shop + brand + variant + volume)."
        tests: [not_null, unique]
      - name: shop_name
        tests: [not_null]
      - name: brand
        tests: [not_null]
      - name: volume_ml
        tests: [not_null]

  - name: fact_price
    description: "Fact table — one row per shop per scrape run with price."
    columns:
      - name: scrape_run_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: price_eur
        tests: [not_null]
      - name: scrape_date
        tests: [not_null]
