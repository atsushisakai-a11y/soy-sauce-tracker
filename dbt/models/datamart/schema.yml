version: 2

models:
  - name: datamart_price_comparison
    description: "Datamart — market price summary grouped by global_product_id and scrape date."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [global_product_id, scrape_month]
    columns:
      - name: global_product_id
        description: "UUID shared by products matched across shops via image similarity."
        tests: [not_null]
      - name: scrape_month
        description: "First day of the month — prices aggregated to year/month granularity."
        tests: [not_null]
      - name: brand
        tests: [not_null]
      - name: product_name
        description: "Representative product name — MAX() across all shops sharing this global_product_id."
        tests: [not_null]
      - name: volume_ml
        description: "Product size in millilitres (e.g. 150, 500, 1000)."
        tests: [not_null]
      - name: shop_count
        tests: [not_null]
      - name: min_price_eur
        tests: [not_null]
      - name: max_price_eur
        tests: [not_null]
      - name: avg_price_eur
        tests: [not_null]
