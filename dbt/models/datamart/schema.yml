version: 2

models:
  - name: datamart_price_comparison
    description: "Datamart — market price summary for Kikkoman Koikuchi Shoyu 500ml."
    columns:
      - name: brand
        tests: [not_null]
      - name: product_name
        tests: [not_null]
      - name: shop_count
        tests: [not_null]
      - name: min_price_eur
        tests: [not_null]
      - name: max_price_eur
        tests: [not_null]
      - name: avg_price_eur
        tests: [not_null]
