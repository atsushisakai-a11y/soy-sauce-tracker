version: 2

models:
  - name: datamart_price_comparison
    description: "Datamart — market price summary grouped by global_product_id and scrape date."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [global_product_id, shop_name, scrape_month]
    columns:
      - name: global_product_id
        description: "UUID shared by products matched across shops via image similarity."
        tests: [not_null]
      - name: shop_name
        description: "Name of the shop selling this product."
        tests: [not_null]
      - name: product_url
        description: "Direct URL to the product page at this shop."
      - name: scrape_month
        description: "First day of the month — prices aggregated to year/month granularity."
        tests: [not_null]
      - name: brand
        tests: [not_null]
      - name: product_name
        description: "Representative product name."
        tests: [not_null]
      - name: volume_ml
        description: "Product size in millilitres (e.g. 150, 500, 1000)."
        tests: [not_null]
      - name: shop_count
        description: "Total number of shops selling this product that month."
        tests: [not_null]
      - name: min_price_eur
        tests: [not_null]
      - name: max_price_eur
        tests: [not_null]
      - name: avg_price_eur
        tests: [not_null]
      - name: avg_price_per_100ml
        description: "Average price per 100ml (EUR) — useful for comparing value across different bottle sizes."
        tests: [not_null]

  - name: datamart_price_comparison_by_brand
    description: "Datamart — avg price per 100ml aggregated by brand and month. One row per brand per scrape_month."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [brand, scrape_month]
    columns:
      - name: brand
        tests: [not_null]
      - name: scrape_month
        tests: [not_null]
      - name: product_count
        tests: [not_null]
      - name: shop_count
        tests: [not_null]
      - name: avg_price_per_100ml
        tests: [not_null]

  - name: datamart_similarity_model_evaluation
    description: >
      Data quality report for the IS_MATCH similarity pipeline — one row per
      evaluation run (keyed by evaluated_at) so Precision, Recall, F1, and
      Accuracy can be tracked over time as the model and ground truth evolve.
      Pairs without a ground truth label are counted in total_pairs but excluded
      from metric computation.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [evaluated_at]
    columns:
      - name: evaluated_at
        description: "Timestamp of the evaluation run — one row per run."
        tests: [not_null, unique]
      - name: total_pairs
        tests: [not_null]
      - name: matched_with_gt
        description: "Pairs that have a human-validated ground truth label."
        tests: [not_null]
      - name: not_in_gt
        description: "Pairs without a ground truth label (excluded from metrics)."
        tests: [not_null]
      - name: gt_coverage_pct
        description: "Percentage of total pairs covered by ground truth."
        tests: [not_null]
      - name: true_positive
        tests: [not_null]
      - name: false_positive
        tests: [not_null]
      - name: false_negative
        tests: [not_null]
      - name: true_negative
        tests: [not_null]
      - name: precision
        description: "TP / (TP + FP)"
        tests: [not_null]
      - name: recall
        description: "TP / (TP + FN)"
        tests: [not_null]
      - name: f1
        description: "2·TP / (2·TP + FP + FN)"
        tests: [not_null]
      - name: accuracy
        description: "(TP + TN) / matched_with_gt"
        tests: [not_null]

  - name: datamart_price_comparison_by_shop
    description: "Datamart — avg price per 100ml aggregated by shop and month. One row per shop per scrape_month."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [shop_name, scrape_month]
    columns:
      - name: shop_name
        tests: [not_null]
      - name: scrape_month
        tests: [not_null]
      - name: product_count
        tests: [not_null]
      - name: brand_count
        tests: [not_null]
      - name: avg_price_per_100ml
        tests: [not_null]
