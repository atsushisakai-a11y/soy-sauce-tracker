version: 2

models:
  - name: staging_prices
    description: "Silver — cleaned price observations with numeric EUR price and price-per-100ml."
    columns:
      - name: shop_name
        tests: [not_null]
      - name: brand
        tests: [not_null]
      - name: product_variant
        tests: [not_null]
      - name: volume_ml
        tests: [not_null]
      - name: price_eur
        description: "Parsed numeric price in EUR."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0.01
                max_value: 50.0
      - name: price_per_100ml_eur
        tests: [not_null]
      - name: currency
        tests:
          - accepted_values:
              values: ["EUR"]

  - name: staging_similarity_scores
    description: "Pairwise product image similarity scores, one row per product pair per scrape date."
    columns:
      - name: scrape_date
        tests: [not_null]
      - name: shop_name_1
        tests: [not_null]
      - name: shop_name_2
        tests: [not_null]
      - name: product_name_1
        tests: [not_null]
      - name: product_name_2
        tests: [not_null]
      - name: similarity_score
        tests: [not_null]
      - name: computed_at
        tests: [not_null]
