version: 2

sources:
  - name: staging
    database: soy-sauce-tracker
    schema: staging
    description: "Staging zone — Python-written tables consumed by dbt models."
    tables:
      - name: staging_product_groups
        description: >
          Maps every (shop_name, product_name) to a global_product_id.
          Products matched by IS_MATCH=TRUE in staging_similarity_scores share
          one UUID; unmatched singletons receive their own unique UUID.
          Written by similarity/assign_product_ids.py (union-find, UUID5).
        columns:
          - name: SHOP_NAME
          - name: PRODUCT_NAME
          - name: GLOBAL_PRODUCT_ID
          - name: COMPUTED_AT

  - name: raw
    database: soy-sauce-tracker
    schema: raw
    description: "Raw landing zone — data loaded directly from the scraper CSV."
    tables:
      - name: raw_osm_shops
        description: "Amsterdam Asian shops discovered via OpenStreetMap — full refresh on every run."
        columns:
          - name: NAME
          - name: ADDRESS
          - name: WEBSITE
          - name: PHONE
          - name: CUISINE
          - name: SHOP_TYPE
          - name: OSM_ID
          - name: OSM_TYPE
          - name: _LOADED_AT

      - name: raw_kikkoman_prices
        description: "One row per shop per scrape run."
        columns:
          - name: scrape_run_id
          - name: shop_name
          - name: product_name
          - name: raw_price
          - name: currency
          - name: product_url
          - name: image_url
          - name: scraped_at
          - name: _loaded_at
