name: 3. Compute - Image Similarity Scores

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - similarity/image_similarity.py

jobs:
  image-similarity:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE:  price_monitoring
      SNOWFLAKE_SCHEMA:    STAGING

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install snowflake-connector-python python-dotenv Pillow requests numpy
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install transformers timm
          pip install rembg onnxruntime
          pip install dbt-snowflake

      - name: Clear existing similarity scores
        run: |
          python - <<'EOF'
          import os, snowflake.connector
          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              role=os.environ.get("SNOWFLAKE_ROLE", ""),
              warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
              database=os.environ["SNOWFLAKE_DATABASE"],
              schema=os.environ["SNOWFLAKE_SCHEMA"],
          )
          cur = conn.cursor()
          cur.execute("DELETE FROM STAGING_SIMILARITY_SCORES")
          conn.commit()
          print(f"Deleted {cur.rowcount} rows from STAGING_SIMILARITY_SCORES")
          conn.close()
          EOF

      - name: Compute image similarity scores
        run: python similarity/image_similarity.py

      - name: Assign global product IDs
        run: python similarity/assign_product_ids.py

      - name: dbt deps
        run: cd dbt && dbt deps

      - name: dbt run - staging_prices (full refresh)
        run: cd dbt && dbt run --full-refresh --select staging_prices

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then ICON="✅"; else ICON="❌"; fi
          MSG="${ICON} *3. Compute - Image Similarity Scores* — ${STATUS}%0ARepo: ${{ github.repository }}%0ATriggered by: ${{ github.event_name }}%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${MSG}" \
            -d parse_mode="Markdown"
