name: 4. Compute - Image Similarity Scores

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - similarity/image_similarity.py

jobs:
  image-similarity:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT: soy-sauce-tracker
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json

      - name: Install dependencies
        run: |
          pip install google-cloud-bigquery python-dotenv Pillow requests numpy
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install transformers timm
          pip install rembg onnxruntime
          pip install dbt-bigquery

      - name: Cache HuggingFace model (DINOv2)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: huggingface-dinov2-base-v1

      - name: Clear existing similarity scores
        run: |
          python - <<'EOF'
          from google.cloud import bigquery
          client = bigquery.Client(project="soy-sauce-tracker")
          TABLE = "soy-sauce-tracker.staging.staging_similarity_scores"
          client.query(f"""
              CREATE TABLE IF NOT EXISTS `{TABLE}` (
                  SIMILARITY_ID STRING, SCRAPE_DATE DATE, SHOP_NAME_1 STRING, SHOP_NAME_2 STRING,
                  PRODUCT_NAME_1 STRING, PRODUCT_NAME_2 STRING, IMAGE_URL_1 STRING, IMAGE_URL_2 STRING,
                  IMAGE_SIMILARITY FLOAT64, NAME_SIMILARITY FLOAT64, COMBINED_SCORE FLOAT64,
                  IS_MATCH BOOL, COMPUTED_AT TIMESTAMP
              )
          """).result()
          client.query(f"TRUNCATE TABLE `{TABLE}`").result()
          print("Truncated staging_similarity_scores")
          EOF

      - name: Compute image similarity scores
        run: python similarity/image_similarity.py

      - name: Assign global product IDs
        run: python similarity/assign_product_ids.py

      - name: dbt deps
        run: cd dbt && dbt deps

      - name: dbt run - staging_prices (full refresh)
        run: cd dbt && dbt run --full-refresh --select staging_prices

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then ICON="✅"; else ICON="❌"; fi
          MSG="${ICON} *2. Compute - Image Similarity Scores* — ${STATUS}%0ARepo: ${{ github.repository }}%0ATriggered by: ${{ github.event_name }}%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${MSG}" \
            -d parse_mode="Markdown"
