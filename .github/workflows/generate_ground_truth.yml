name: 92. Generate Ground Truth (Groq Vision Oracle)

on:
  workflow_dispatch:

jobs:
  generate-ground-truth:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT: soy-sauce-tracker
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json

      - name: Install dependencies
        run: pip install groq google-cloud-bigquery python-dotenv

      - name: Generate ground truth
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python similarity/generate_ground_truth.py

      - name: Upload ground_truth.csv
        uses: actions/upload-artifact@v4
        with:
          name: ground-truth
          path: |
            similarity/ground_truth.csv
            similarity/ground_truth_uncertain.csv
          retention-days: 90

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then ICON="✅"; else ICON="❌"; fi
          MSG="${ICON} *92. Generate Ground Truth* — ${STATUS}%0ARepo: ${{ github.repository }}%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${MSG}" \
            -d parse_mode="Markdown"
