name: 91. dbt - Run Staging Shops

on:
  workflow_dispatch:

jobs:
  dbt-staging-shops:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT: soy-sauce-tracker
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json

      - name: Install dbt
        run: pip install dbt-bigquery google-cloud-bigquery

      - name: dbt deps
        run: cd dbt && dbt deps

      - name: Check raw_osm_shops table in BigQuery
        run: |
          python - <<'EOF'
          import os
          from google.cloud import bigquery
          client = bigquery.Client(project=os.environ["GCP_PROJECT"])
          table_ref = "soy-sauce-tracker.raw.raw_osm_shops"
          try:
              table = client.get_table(table_ref)
              print(f"Table found: {table_ref}")
              print(f"Columns: {[f.name for f in table.schema]}")
              result = client.query(f"SELECT COUNT(*) FROM `{table_ref}`").result()
              print(f"Row count: {list(result)[0][0]}")
          except Exception as e:
              print(f"Table not found or error: {e}")
          EOF

      - name: dbt run - staging_shops
        run: cd dbt && dbt run --select +staging_shops

      - name: dbt test - staging_shops
        run: cd dbt && dbt test --select +staging_shops
