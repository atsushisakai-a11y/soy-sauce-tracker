name: 91. dbt - Run Staging Shops

on:
  workflow_dispatch:

jobs:
  dbt-staging-shops:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: dbt deps
        run: cd dbt && dbt deps

      - name: Check RAW_OSM_SHOPS table in Snowflake
        run: |
          python - <<'EOF'
          import os, snowflake.connector
          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              role=os.environ.get("SNOWFLAKE_ROLE",""),
              warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
              database="price_monitoring",
              schema="RAW",
          )
          cur = conn.cursor()
          cur.execute("SHOW TABLES LIKE 'RAW_OSM_SHOPS' IN SCHEMA price_monitoring.RAW")
          tables = cur.fetchall()
          print("Tables found:", tables)
          if tables:
              cur.execute("DESCRIBE TABLE price_monitoring.RAW.RAW_OSM_SHOPS")
              print("Columns:", [r[0] for r in cur.fetchall()])
              cur.execute("SELECT COUNT(*) FROM price_monitoring.RAW.RAW_OSM_SHOPS")
              print("Row count:", cur.fetchone()[0])
          conn.close()
          EOF

      - name: dbt run - staging_shops
        run: cd dbt && dbt run --select +staging_shops

      - name: dbt test - staging_shops
        run: cd dbt && dbt test --select +staging_shops
