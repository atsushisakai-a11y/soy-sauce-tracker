name: 7. Run DWH Models

on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: "Full refresh (rebuilds tables from scratch — use when product_id keys change)"
        type: boolean
        default: false

jobs:
  dbt-dwh:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT: soy-sauce-tracker
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: dbt deps
        run: cd dbt && dbt deps

      - name: dbt run - dim_price_history, dim_price, fact_price, fact_similarity_scores
        run: |
          FLAGS=""
          if [ "${{ inputs.full_refresh }}" = "true" ]; then FLAGS="--full-refresh"; fi
          cd dbt && dbt run $FLAGS --select dim_price_history dim_price fact_price fact_similarity_scores

      - name: dbt test - dwh models
        run: cd dbt && dbt test --select dim_price_history dim_price fact_price fact_similarity_scores
