name: 4. dbt - Run DWH Models

on:
  workflow_dispatch:

jobs:
  dbt-dwh:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT: soy-sauce-tracker
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: dbt deps
        run: cd dbt && dbt deps

      - name: dbt run - dim_price_history, dim_price, fact_price
        run: cd dbt && dbt run --select dim_price_history dim_price fact_price

      - name: dbt test - dwh models
        run: cd dbt && dbt test --select dim_price_history dim_price fact_price
