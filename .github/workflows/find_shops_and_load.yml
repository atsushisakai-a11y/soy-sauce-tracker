name: 90. Find Amsterdam Asian Shops & Load to BigQuery

on:
  workflow_dispatch:

jobs:
  find-and-load:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT: soy-sauce-tracker
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json

      - name: Install dependencies
        run: pip install requests python-dotenv google-cloud-bigquery

      - name: Find Amsterdam Asian shops
        run: cd scraper && python find_shops.py

      - name: Check CSV was created
        run: |
          echo "=== scraper/output contents ==="
          ls -lh scraper/output/
          echo "=== first 5 lines of CSV ==="
          head -5 scraper/output/amsterdam_asian_shops.csv

      - name: Load shops to BigQuery
        run: python loader/load_shops_to_bigquery.py scraper/output/amsterdam_asian_shops.csv

      - uses: actions/upload-artifact@v4
        with:
          name: amsterdam-asian-shops-${{ github.run_id }}
          path: scraper/output/amsterdam_asian_shops.csv
          retention-days: 90
