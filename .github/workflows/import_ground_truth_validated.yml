name: 5. Import Ground Truth Validated

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - similarity/ground_truth_validated.csv

jobs:
  import-ground-truth-validated:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT: soy-sauce-tracker
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json

      - name: Install dependencies
        run: pip install google-cloud-bigquery python-dotenv

      - name: Import validated ground truth to BigQuery
        run: python similarity/import_ground_truth_validated.py

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then ICON="✅"; else ICON="❌"; fi
          MSG="${ICON} *3. Import Ground Truth Validated* — ${STATUS}%0ARepo: ${{ github.repository }}%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${MSG}" \
            -d parse_mode="Markdown"
