name: 5. dbt - Run Datamart Model

on:
  workflow_dispatch:

jobs:
  dbt-datamart:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT: soy-sauce-tracker
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: dbt deps
        run: cd dbt && dbt deps

      - name: dbt run - datamart_price_comparison
        run: cd dbt && dbt run --select datamart_price_comparison

      - name: dbt test - datamart_price_comparison
        run: cd dbt && dbt test --select datamart_price_comparison
