name: dbt - Run Staging Model

on:
  workflow_dispatch:

jobs:
  dbt-staging:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE:      ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: dbt deps
        run: cd dbt && dbt deps

      - name: Debug - check macro file and package conflicts
        run: |
          echo "=== our macro file ==="
          cat dbt/macros/generate_schema_name.sql
          echo ""
          echo "=== packages that define generate_schema_name ==="
          find dbt/dbt_packages -name "*.sql" | xargs grep -l "generate_schema_name" 2>/dev/null || echo "none found"
          echo ""
          echo "=== dbt_project.yml ==="
          cat dbt/dbt_project.yml

      - name: dbt run - staging_kikkoman_prices
        run: cd dbt && dbt run --select staging_kikkoman_prices --log-level debug 2>&1 | head -100

      - name: dbt test - staging_kikkoman_prices
        run: cd dbt && dbt test --select staging_kikkoman_prices
