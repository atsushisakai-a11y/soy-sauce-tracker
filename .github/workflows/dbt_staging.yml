name: 2. Generate - Brand and Volume for staging.staging_prices

on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: "Full refresh (rebuilds table from scratch — use when columns are added)"
        type: boolean
        default: false

jobs:
  dbt-staging:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT: soy-sauce-tracker
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: dbt deps
        run: cd dbt && dbt deps

      - name: Bootstrap staging_product_groups if not exists
        run: |
          pip install google-cloud-bigquery
          python - <<'EOF'
          from google.cloud import bigquery
          client = bigquery.Client(project="soy-sauce-tracker")
          client.query("""
              CREATE TABLE IF NOT EXISTS `soy-sauce-tracker.staging.staging_product_groups` (
                  SHOP_NAME         STRING,
                  PRODUCT_NAME      STRING,
                  GLOBAL_PRODUCT_ID STRING,
                  COMPUTED_AT       TIMESTAMP
              )
          """).result()
          print("staging_product_groups is ready.")
          EOF

      - name: dbt run - staging_prices
        run: |
          FLAGS=""
          if [ "${{ inputs.full_refresh }}" = "true" ]; then FLAGS="--full-refresh"; fi
          cd dbt && dbt run $FLAGS --select staging_prices

      - name: dbt test - staging_prices
        run: cd dbt && dbt test --select staging_prices
