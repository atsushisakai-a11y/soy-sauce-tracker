name: 1. Scrape - Kikkoman Prices & Load to BigQuery

on:
  workflow_dispatch:

jobs:
  scrape-and-load:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT: soy-sauce-tracker
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml google-cloud-bigquery python-dotenv

      - name: Run scraper
        run: cd scraper && python scraper.py

      - name: Load CSV to BigQuery
        run: |
          CSV=$(ls scraper/output/kikkoman_prices_*.csv | tail -1)
          echo "Loading $CSV"
          python loader/load_to_bigquery.py "$CSV"

      - uses: actions/upload-artifact@v4
        with:
          name: kikkoman-prices-${{ github.run_id }}
          path: scraper/output/*.csv
          retention-days: 90
