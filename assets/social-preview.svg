<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a0a00"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Gold accent bar left -->
  <rect x="0" y="0" width="8" height="640" fill="url(#gold)"/>

  <!-- Gold accent bar right -->
  <rect x="1272" y="0" width="8" height="640" fill="url(#gold)"/>

  <!-- Big emoji -->
  <text x="640" y="210" font-size="120" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🫙</text>

  <!-- Main title -->
  <text x="640" y="310" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="68" fill="url(#gold)" text-anchor="middle" filter="url(#glow)" letter-spacing="-1">EUROPEAN SOY SAUCE</text>
  <text x="640" y="385" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="68" fill="#ffffff" text-anchor="middle" letter-spacing="-1">PRICE TRACKER</text>

  <!-- Artist credit line -->
  <text x="640" y="445" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="26" fill="#78716c" text-anchor="middle" letter-spacing="4">by  A T S U S H I  feat.  C L A U D E</text>

  <!-- Divider line -->
  <rect x="480" y="465" width="320" height="1" fill="#d97706" opacity="0.5"/>

  <!-- Tech stack pills -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500">
    <!-- Python -->
    <rect x="172" y="490" width="110" height="34" rx="17" fill="#ffffff10" stroke="#ffffff20" stroke-width="1"/>
    <text x="227" y="512" fill="#f59e0b" text-anchor="middle">Python</text>
    <!-- dbt -->
    <rect x="298" y="490" width="80" height="34" rx="17" fill="#ffffff10" stroke="#ffffff20" stroke-width="1"/>
    <text x="338" y="512" fill="#f59e0b" text-anchor="middle">dbt</text>
    <!-- BigQuery -->
    <rect x="394" y="490" width="120" height="34" rx="17" fill="#ffffff10" stroke="#ffffff20" stroke-width="1"/>
    <text x="454" y="512" fill="#f59e0b" text-anchor="middle">BigQuery</text>
    <!-- Next.js -->
    <rect x="530" y="490" width="110" height="34" rx="17" fill="#ffffff10" stroke="#ffffff20" stroke-width="1"/>
    <text x="585" y="512" fill="#f59e0b" text-anchor="middle">Next.js</text>
    <!-- DINOv2 -->
    <rect x="656" y="490" width="110" height="34" rx="17" fill="#ffffff10" stroke="#ffffff20" stroke-width="1"/>
    <text x="711" y="512" fill="#f59e0b" text-anchor="middle">DINOv2</text>
    <!-- GitHub -->
    <rect x="782" y="490" width="120" height="34" rx="17" fill="#ffffff10" stroke="#ffffff20" stroke-width="1"/>
    <text x="842" y="512" fill="#f59e0b" text-anchor="middle">GitHub CI</text>
    <!-- Claude -->
    <rect x="918" y="490" width="120" height="34" rx="17" fill="#d97706" stroke="#f59e0b" stroke-width="1"/>
    <text x="978" y="512" fill="#000000" text-anchor="middle" font-weight="700">Claude Code</text>
  </g>

  <!-- Bottom tagline -->
  <text x="640" y="590" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#44403c" text-anchor="middle" letter-spacing="2">REAL PRICES · REAL DATA · OPEN SOURCE</text>

  <!-- Corner URL -->
  <text x="1250" y="628" font-family="monospace" font-size="14" fill="#44403c" text-anchor="end">github.com/atsushisakai-a11y/soy-sauce-tracker</text>
</svg>
